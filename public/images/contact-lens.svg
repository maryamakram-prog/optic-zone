<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="#f8fafc">
  <!-- Background -->
  <rect width="800" height="800" fill="#f8fafc"/>
  
  <g transform="translate(150, 250)">
    <!-- Shadow -->
    <rect x="10" y="20" width="500" height="300" rx="20" fill="#e2e8f0" />
    
    <!-- Box Body -->
    <rect width="500" height="300" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
    
    <!-- Top colored strip -->
    <path d="M 0 20 Q 0 0 20 0 L 480 0 Q 500 0 500 20 L 500 80 L 0 80 Z" fill="#0ea5e9" />
    
    <!-- Branding text on strip -->
    <text x="40" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="3">OPTIC ZONE</text>
    <text x="460" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.8" text-anchor="end">PREMIUM</text>

    <!-- Lens illustration -->
    <ellipse cx="140" cy="180" rx="80" ry="40" fill="none" stroke="#38bdf8" stroke-width="6"/>
    <circle cx="140" cy="180" r="25" fill="#bae6fd" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M 90 180 Q 140 140 190 180" fill="none" stroke="#e0f2fe" stroke-width="3" opacity="0.8"/>

    <!-- Product Details -->
    <text x="260" y="150" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#334155">Contact Lenses</text>
    <text x="260" y="190" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Daily Disposable</text>
    
    <!-- Pack Size -->
    <rect x="260" y="220" width="100" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="310" y="247" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#475569" text-anchor="middle">30 PACK</text>
  </g>
</svg>
